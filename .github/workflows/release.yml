name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write # npm provenance

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          registry-url: https://registry.npmjs.org

      # npm trusted publishing (OIDC) needs npm >= 11.5.1.
      - run: npm install -g npm@latest

      - run: npm ci

      - run: npm run build

      # Opens a "Version Packages" PR when changesets exist; on merge (no
      # changesets left) publishes via OIDC trusted publishing — no token, and
      # provenance is attached automatically. Each package must have this repo +
      # workflow set as its Trusted Publisher on npmjs.com.
      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          version: npm run version
          publish: npm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
