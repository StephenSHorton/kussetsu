<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Kussetsu</title>
    <style>
      html, body {
        margin: 0; height: 100%; background: #0a0b12; overflow: hidden;
        overscroll-behavior: none;        /* no pull-to-refresh / rubber-band fighting our drag-scroll */
        -webkit-text-size-adjust: 100%;   /* iOS must not auto-inflate font sizes */
        -webkit-tap-highlight-color: transparent;
      }
      /* A positioned stage holding the GPU canvas. createGpuRoot() places its own
         invisible semantics/input overlay over the canvas inside this stage.
         100dvh tracks the *visible* area as the mobile URL bar shows/hides; 100vh is the fallback. */
      #stage { position: relative; width: 100vw; height: 100vh; height: 100dvh; }
      /* Both dimensions pinned so the canvas's attribute-derived aspect-ratio
         can't leak into layout (the classic feedback-loop gotcha).
         touch-action:none — Kussetsu owns the gestures (drag-scroll / pan), so the browser
         must not hijack a vertical drag as a native scroll and cancel our pointer stream. */
      #gpu { position: absolute; inset: 0; width: 100%; height: 100%; display: block; touch-action: none; }
    </style>
  </head>
  <body>
    <div id="stage">
      <canvas id="gpu"></canvas>
    </div>
    <script type="module" src="/src/examples/main.tsx"></script>
  </body>
</html>
