<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kussetsu</title>
    <style>
      html, body { margin: 0; height: 100%; background: #0a0b12; overflow: hidden; }
      /* A positioned stage holding the GPU canvas. createGpuRoot() places its own
         invisible semantics/input overlay over the canvas inside this stage. */
      #stage { position: relative; width: 100vw; height: 100vh; }
      /* Both dimensions pinned so the canvas's attribute-derived aspect-ratio
         can't leak into layout (the classic feedback-loop gotcha). */
      #gpu { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
    </style>
  </head>
  <body>
    <div id="stage">
      <canvas id="gpu"></canvas>
    </div>
    <script type="module" src="/src/examples/main.tsx"></script>
  </body>
</html>
